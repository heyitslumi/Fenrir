version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-panel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-panel}
      POSTGRES_DB: ${POSTGRES_DB:-panel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-panel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/luxxy-hosting/fenrir-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-panel}:${POSTGRES_PASSWORD:-panel}@postgres:5432/${POSTGRES_DB:-panel}"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "3001"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "3001:3001"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    image: ghcr.io/luxxy-hosting/fenrir-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_uploads:
